<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Google Pay...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d14; color: #eeeef5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: #16161f; border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 36px 28px; max-width: 360px;
      width: 100%; text-align: center;
    }
    .icon {
      width: 70px; height: 70px; border-radius: 50%;
      background: linear-gradient(135deg, #1a73e8, #0057c9);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 32px;
    }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 14px; color: #6b6b8a; line-height: 1.6; margin-bottom: 24px; }

    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.1); border-top-color: #00d46a;
      animation: spin 0.8s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .manual-btn {
      display: block; width: 100%;
      background: #1a73e8; color: #fff; border: none;
      border-radius: 12px; padding: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      text-decoration: none; margin-bottom: 12px;
      transition: filter 0.2s;
    }
    .manual-btn:hover { filter: brightness(1.1); }

    .upi-box {
      background: #1e1e2a; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 14px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px;
    }
    .upi-box .upi-id { font-size: 13px; color: #4facfe; word-break: break-all; text-align: left; }
    .copy-btn {
      background: rgba(79,172,254,0.12); color: #4facfe;
      border: none; border-radius: 7px; padding: 7px 12px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
    }
    .copy-btn:active { opacity: 0.7; }

    .amount-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; color: #6b6b8a; margin-bottom: 6px;
    }
    .amount-row span:last-child { color: #00d46a; font-weight: 700; font-size: 16px; }

    .note { font-size: 11px; color: #6b6b8a; margin-top: 16px; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">G</div>
  <div class="spinner" id="spinner"></div>
  <h2>Opening Google Pay...</h2>
  <p id="status-text">Please wait while we open Google Pay for you.</p>

  <div class="amount-row">
    <span>Amount to Pay</span>
    <span id="show-amount">₹—</span>
  </div>

  <div class="upi-box">
    <div class="upi-id" id="show-upi">—</div>
    <button class="copy-btn" onclick="copyUPI()">Copy</button>
  </div>

  <a id="manual-link" class="manual-btn" href="#">
    Open Google Pay Manually
  </a>

  <div class="note">If Google Pay doesn't open, copy the UPI ID above and paste it in Google Pay → New Payment</div>
</div>

<script>
  // Parse params from URL
  const p      = new URLSearchParams(window.location.search);
  const pa     = p.get('pa') || '';
  const pn     = p.get('pn') || '';
  const am     = p.get('am') || '';
  const cu     = p.get('cu') || 'INR';
  const tn     = p.get('tn') || '';

  const upiLink = `upi://pay?pa=${encodeURIComponent(pa)}&pn=${encodeURIComponent(pn)}&am=${am}&cu=${cu}&tn=${encodeURIComponent(tn)}`;

  // Show details
  document.getElementById('show-upi').textContent    = pa;
  document.getElementById('show-amount').textContent = '₹' + am;
  document.getElementById('manual-link').href        = upiLink;

  // Auto redirect after short delay
  setTimeout(() => {
    window.location.href = upiLink;
    // After redirect attempt, update UI
    setTimeout(() => {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status-text').textContent =
        "If Google Pay didn't open automatically, tap the button below or copy the UPI ID.";
    }, 1500);
  }, 800);

  // Copy UPI ID
  function copyUPI() {
    navigator.clipboard.writeText(pa).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }
</script>
</body>
</html>
